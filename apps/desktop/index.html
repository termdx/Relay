<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/relay-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relay</title>
    <script>
      // Apply the persisted theme before first paint (mirrors lib/theme.tsx).
      // Light is the default; dark is opt-in (or via System preference).
      try {
        var t = localStorage.getItem("relay.theme") || "light";
        if (t === "dark" || (t === "system" && matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      } catch (_) {
        /* default to light */
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
